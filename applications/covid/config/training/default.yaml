output_dir: ${hydra:runtime.output_dir}/model
run_name: ${hydra:runtime.output_dir}/model
num_train_epochs: 10
per_device_train_batch_size: 512  # Will be divided by group_size
per_device_eval_batch_size: 512
warmup_ratio: 0.1
learning_rate: 5e-5
lr_scheduler_type: "linear"
weight_decay: 0.001
logging_steps: 10
eval_steps: 100
save_steps: 500
save_total_limit: 3
gradient_accumulation_steps: 1
fp16: true
# H100 config: set fp16: false, bf16: true, per_device_train_batch_size: 512,
# gradient_accumulation_steps: 2. Use CUDA_VISIBLE_DEVICES to select GPU count.
eval_strategy: "steps"
save_strategy: "steps"
load_best_model_at_end: true
metric_for_best_model: "eval_balanced_accuracy"
report_to: "wandb"
remove_unused_columns: false
dataloader_prefetch_factor: 4
dataloader_num_workers: 8
eval_accumulation_steps: 100
deepspeed: config/ds_zero2.json
