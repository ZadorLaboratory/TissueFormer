defaults:
  - _self_
  - model: default
  - data: default
  - training: default
  - wandb: default
  - optional local: default
  - override hydra/hydra_logging: default
  - override hydra/job_logging: default

seed: 42
debug: false
dataset_name: "combat"  # Options: combat, ren, stevenson, combined
output_dir: outputs/${dataset_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
run_test_set: true
early_stopping_patience: 3  # Stop after N evals with no improvement; null to disable

# DL benchmark flags
run_cellcnn: false
run_scagg: false
run_scrat: false
run_classical: true
model_checkpoint_path: null

attention_analysis:
  layer: -1
  top_k: 15
  split: test
  max_groups: null

hydra:
  run:
    dir: ${output_dir}
  sweep:
    dir: ${output_dir}
    subdir: ${hydra.job.id}
