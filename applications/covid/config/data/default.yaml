dataset_path: null  # Set in config/local/default.yaml per machine
h5ad_path: null  # Set in config/local/default.yaml per machine
splits_path: null  # Set in config/local/default.yaml per machine
cv_fold: 0  # Cross-validation fold index
group_size: 64
validation_split: 0.1

# Donor/label column names in the tokenized dataset
donor_key: "donor_id"
label_key: "label"
cell_type_key: "cell_type"

label_names:
  0: "control"
  1: "mild"
  2: "severe"

max_train_samples: null
max_eval_samples: null

# Class weights configuration
class_weights:
  enabled: true
  method: "balanced"  # "inverse", "balanced", or "effective"
  path: null  # If null, compute from training labels
