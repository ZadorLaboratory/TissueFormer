defaults:
  - _self_
  - model: default
  - data: default
  - training: default
  - wandb: default
  - optional local: default
  - override hydra/hydra_logging: default
  - override hydra/job_logging: default

seed: 42
debug: false
single_cell_augmentation: false
output_dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
run_test_set: true
test_by_cell_type: false
min_N: 5000
num_predict_epochs: 1
model_checkpoint_path: null

attention_analysis:
  layer: -1
  top_k: 5
  split: test
  max_groups: null
  max_labels_in_plot: 12


hydra:
  run:
    dir: ${output_dir}
  sweep:
    dir: ${output_dir}
    subdir: ${hydra.job.id}